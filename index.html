<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Writing Practice - Goat</title>
<style>
body { font-family: Arial; background: linear-gradient(to bottom, #a8e6cf, #dcedc1); text-align:center; padding:30px; }
.container { max-width:700px; margin:auto; background:#ffffffee; padding:25px; border-radius:15px; }
.word { font-size:50px; font-weight:bold; }
.trace-area { position:relative; width:420px; height:100px; margin:30px auto; }
.trace-guide { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; font-weight:bold; letter-spacing:6px; color:transparent; -webkit-text-stroke:2px #999; }
#traceCanvas { position:absolute; top:0; left:0; width:420px; height:100px; z-index:2; border:1px dashed #ccc; }
.image-box img { width:200px; border-radius:12px; }
button { padding:12px 20px; margin:10px; border-radius:8px; border:none; cursor:pointer; }
.check-btn { background:#4CAF50;color:white; }
.clear-btn { background:#E74C3C;color:white; }
.result { font-size:28px; margin-top:15px; }
</style>
</head>
<body>
<div class="container">
<h1>Writing Practice 🐐</h1>
<div class="word">GOAT</div>
<div class="image-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Hausziege_04.jpg" alt="Goat">
</div>
<div class="trace-area">
<div class="trace-guide">GOAT</div>
<canvas id="traceCanvas" width="420" height="100"></canvas>
</div>
<button class="check-btn" onclick="checkWriting()">✔ Check</button>
<button class="clear-btn" onclick="clearCanvas()">✖ Clear</button>
<div id="result" class="result"></div>
</div>
<script>
const canvas = document.getElementById("traceCanvas");
const ctx = canvas.getContext("2d");
let drawing=false,totalLength=0,lastX=0,lastY=0;
ctx.lineWidth=4; ctx.lineCap="round";
function drawLine(x,y){ let dx=x-lastX, dy=y-lastY; totalLength+=Math.sqrt(dx*dx+dy*dy); ctx.lineTo(x,y); ctx.stroke(); lastX=x; lastY=y; }
canvas.addEventListener("mousedown", e=>{drawing=true; lastX=e.offsetX; lastY=e.offsetY; ctx.beginPath(); ctx.moveTo(lastX,lastY);});
canvas.addEventListener("mousemove", e=>{if(drawing) drawLine(e.offsetX,e.offsetY);});
canvas.addEventListener("mouseup", ()=>drawing=false);
canvas.addEventListener("mouseleave", ()=>drawing=false);
canvas.addEventListener("touchstart", e=>{const touch=e.touches[0]; const rect=canvas.getBoundingClientRect(); drawing=true; lastX=touch.clientX-rect.left; lastY=touch.clientY-rect.top; ctx.beginPath(); ctx.moveTo(lastX,lastY);});
canvas.addEventListener("touchmove", e=>{if(!drawing) return; e.preventDefault(); const touch=e.touches[0]; const rect=canvas.getBoundingClientRect(); drawLine(touch.clientX-rect.left,touch.clientY-rect.top);},{passive:false});
canvas.addEventListener("touchend", ()=>drawing=false);
canvas.addEventListener("touchcancel", ()=>drawing=false);
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); totalLength=0; document.getElementById("result").innerText=""; }
const successAudio = new Audio('button-37a.mp3');
const failAudio = new Audio('beep-03.mp3');
function playSuccessSound(){ successAudio.currentTime=0; successAudio.play().catch(e=>console.log("Playback failed:", e)); }
function playFailSound(){ failAudio.currentTime=0; failAudio.play().catch(e=>console.log("Playback failed:", e)); }
function checkWriting(){
    const result=document.getElementById("result");
    if(totalLength>900){
        result.innerHTML="Well done! 🎉";
        result.style.color="green";
        playSuccessSound();
    } else {
        result.innerHTML="Try again 😢";
        result.style.color="red";
        playFailSound();
    }
}
</script>
</body>
</html>
